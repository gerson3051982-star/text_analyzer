name: CI pipeline
on:
    push:
        branches: [ "main" ]
    pull_request:
        branches: [ "main" ]

permissions:
    contents: read
    packages: write

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v3.2.0
            - name: Setup Python 
              uses: actions/setup-python@v4.4.1
              with:
                python-version: 3.13.7
            - name: Install dependencies
              run: pip install -r requirements-dev.txt
            - name: Check linting with Ruff
              run: ruff check .
            - name: Run tests
              run: pytest tests/
              
            
    